// ================= 全局顺序计数器（稳定不报错） =================
async function getGlobalIndex() {
  try {
    let r = await fetch("https://api.countapi.xyz/get/bestkoalana/hemu");
    let d = await r.json();
    return d.value || 0;
  } catch(e) { return 0; }
}

async function addGlobalIndex() {
  try {
    await fetch("https://api.countapi.xyz/hit/bestkoalana/hemu");
  } catch(e) {}
}

// ================= 显示文案 =================
async function show() {
  let idx = await getGlobalIndex();
  let realIdx = idx % textList.length;
  document.getElementById("textBox").innerText = textList[realIdx];
  await addGlobalIndex();
}

// ================= 复制功能 =================
document.getElementById("copyBtn").onclick = function(){
  let t = document.getElementById("textBox").innerText;
  let i = document.createElement("input");
  i.value = t;
  document.body.appendChild(i);
  i.select();
  document.execCommand("copy");
  document.body.removeChild(i);
  alert("复制成功！");
}

// ================= 启动页面 =================
window.onload = function(){
  show();
  // 生成当前页面二维码

  });
}
