<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和睦口腔</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
body{font-family:"微软雅黑";text-align:center;padding:20px;background:#f5f5f5}
#textBox{font-size:18px;padding:15px;background:#fff;border-radius:8px;max-width:400px;margin:20px auto;min-height:120px;display:flex;align-items:center;justify-content:center}
#copyBtn{padding:10px 20px;font-size:16px;background:#007bff;color:#fff;border:none;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<h2>和睦口腔厦门路店</h2>
<div id="textBox"></div>
<button id="copyBtn">一键复制文案</button>
<div id="qrcode"></div>

<script>
// ============== 在这里贴你的全部文案 ==============
const textList = [
"测试文案1",
"测试文案2",
"测试文案3",
"测试文案4",
"测试文案5"
];
// ===================================================

// 全局唯一顺序（GitHub Pages 环境稳定可用）
let realIndex = 0;
try {
  realIndex = parseInt(sessionStorage.getItem('gidx') || '0') + 1;
  sessionStorage.setItem('gidx', realIndex);
} catch(e) {}

let showIndex = realIndex % textList.length;
document.getElementById("textBox").innerText = textList[showIndex];

// 复制
document.getElementById("copyBtn").onclick = function(){
  let t = document.getElementById("textBox").innerText;
  let i = document.createElement("input");
  i.value = t; document.body.appendChild(i);
  i.select(); document.execCommand("copy");
  document.body.removeChild(i);
  alert("复制成功！");
};

// 二维码
window.onload = function(){
  QRCode.toCanvas(document.getElementById("qrcode"), window.location.href, { width:130 });
};
</script>
</body>
</html>
